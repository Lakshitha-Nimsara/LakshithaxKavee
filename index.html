<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Invisible SVG to define the perfect heart shape -->
    <svg style="position: absolute; width: 0; height: 0;">
        <clipPath id="heart-clip" clipPathUnits="objectBoundingBox">
            <path d="M0.5,0.853 C0.5,0.853 0,0.528 0,0.278 C0,0.063 0.224,-0.035 0.388,0.07 C0.449,0.11 0.5,0.184 0.5,0.184 C0.5,0.184 0.551,0.11 0.612,0.07 C0.776,-0.035 1,0.063 1,0.278 C1,0.528 0.5,0.853 0.5,0.853 Z"></path>
        </clipPath>
    </svg>

    <!-- Screen 1: Landing Page -->
    <div id="screen1" class="screen active">
        <h1 class="glow-text">Hello My Love ❤️</h1>
        <button id="startBtn" class="lovely-btn">Click here</button>
    </div>

    <!-- Screen 2: The Question -->
    <div id="screen2" class="screen hidden">
        <h1 class="glow-text">Do you love me?</h1>
        <div class="button-container">
            <button id="yesBtn" class="lovely-btn">Yes</button>
            <button id="noBtn" class="lovely-btn danger">No</button>
        </div>
        
        <!-- The ZERO-LAG Cat Container (All cats load instantly in background) -->
        <div id="catContainer" class="cat-container">
            <img src="sadcat1.gif" id="cat1" class="cat-frame active-frame" alt="cat">
            <img src="sadcat2.gif" id="cat2" class="cat-frame" alt="cat">
            <img src="sadcat3.gif" id="cat3" class="cat-frame" alt="cat">
            <img src="sadcat4.gif" id="cat4" class="cat-frame" alt="cat">
            <img src="sadcat5.gif" id="cat5" class="cat-frame" alt="cat">
        </div>
    </div>

    <!-- Screen 3: The Envelope & Letter -->
    <div id="screen3" class="screen hidden">
        <div id="envelopeContainer" class="envelope-wrapper">
            <img src="envelop.png" id="envelopeImg" alt="Envelope">
            <div id="tooltip" class="tooltip hidden-tooltip">මේක click කරන්න eii 😁💋</div>
        </div>
        
        <div id="letterPaper" class="letter-hidden">
            
            <!-- The Photo in a Red Heart -->
            <div id="heartPhoto" class="heart-photo-wrapper">
                <img src="lov.jpeg" alt="Love" class="heart-img">
            </div>

            <div class="paper-content">
                <p id="typewriterText"></p>
                <span id="cursor">|</span>
            </div>
            <!-- The Signature -->
            <div id="signature" class="signature">Your Love ❤️</div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
